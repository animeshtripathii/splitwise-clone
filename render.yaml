services:
  - type: web
    name: splitwise-backend
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --chdir backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: splitwise-db
          property: connectionString

databases:
  - name: splitwise-db
    plan: free
